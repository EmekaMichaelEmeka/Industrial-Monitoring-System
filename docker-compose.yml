services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: industrial-mqtt
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mqtt/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    restart: unless-stopped

  dashboard:
    image: nginx:alpine
    container_name: industrial-dashboard
    ports:
      - "8080:80"
    volumes:
      - ./dashboard:/usr/share/nginx/html:ro
    depends_on:
      - mosquitto
    restart: unless-stopped
